<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMIC Contact Search</title>
  <link rel="icon" type="image/png" href="/static/img/amic-logo-color.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css">
  <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css">
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <img src="/static/img/amic-logo-white.png?v=2" alt="AMIC STL">
      <span class="brand-sub">Contact Search</span>
    </a>
    <div class="topbar-links">
      <a class="nav-link active" href="/">Search</a>
      <a class="nav-link" href="/email-finder">Email Finder</a>
      <a class="nav-link" href="/import">Import</a>
      <a class="logout" href="/logout">Sign out</a>
    </div>
  </header>

  <main class="layout" x-data="{ adv:false, sw:0.7 }">
    <form id="searchForm" class="panel" @submit.prevent>
      <label class="field">
        <span>Search</span>
        <input type="text" id="q" name="q"
               placeholder="e.g. workforce development, CNC machining, robotics…" autofocus>
      </label>

      <label class="field">
        <span>Tags <small>(match any)</small></span>
        <select id="tags" multiple placeholder="Pick one or more tags…"></select>
      </label>

      <div class="grid-2">
        <label class="field"><span>State</span>
          <select id="state"><option value="">Any</option></select>
        </label>
        <label class="field"><span>POC</span>
          <select id="poc"><option value="">Any</option></select>
        </label>
      </div>

      <div class="grid-2">
        <label class="field"><span>Source list</span>
          <select id="source"><option value="">Any</option></select>
        </label>
        <label class="field"><span>Email status</span>
          <select id="email_status"><option value="">Any</option></select>
        </label>
      </div>

      <label class="switch">
        <input type="checkbox" id="include_dnc" role="switch">
        <span>Include do-not-contact</span>
      </label>

      <button type="button" class="link-toggle" @click="adv = !adv"
              x-text="adv ? '− Advanced options' : '+ Advanced options'">+ Advanced options</button>
      <div class="adv" x-show="adv" x-cloak>
        <label class="field">
          <span>Relevance: keyword ⟷ meaning (<span x-text="sw"></span>)</span>
          <input type="range" id="semantic_weight" min="0" max="1" step="0.1"
                 value="0.7" x-model="sw">
        </label>
      </div>

      <div class="actions">
        <button type="submit" id="searchBtn" class="btn-primary">Search</button>
        <button type="button" id="resetBtn" class="btn-ghost">Reset</button>
      </div>
      <p class="hint">Tip: leave the search box empty to browse purely by filters.</p>
    </form>

    <section class="results">
      <div class="results-bar">
        <span id="status" class="status">Enter a search to begin.</span>
        <div class="results-actions">
          <span id="selCount" class="sel-count" hidden></span>
          <button type="button" id="findEmailBtn" class="btn-ghost" hidden>✉ Find emails</button>
          <div class="lists-menu">
            <button type="button" id="listsBtn" class="btn-ghost">★ Lists</button>
            <div id="listsPanel" class="lists-panel" hidden>
              <div class="lists-head">Saved lists</div>
              <ul id="listsUl" class="lists-ul"><li class="muted sm pad">Loading…</li></ul>
              <button type="button" id="newListBtn" class="btn-primary block-btn">+ New list from selection</button>
            </div>
          </div>
          <div class="lists-menu">
            <button type="button" id="exportBtn" class="btn-outline">⬇ Export ▾</button>
            <div id="exportPanel" class="lists-panel export-panel" hidden>
              <div class="lists-head">Export <span id="exportScope" class="muted"></span></div>
              <label class="switch sm-switch"><input type="checkbox" id="optRequireEmail" checked>
                <span>Only contacts with an email</span></label>
              <label class="switch sm-switch"><input type="checkbox" id="optDedupeEmail" checked>
                <span>Remove duplicate addresses</span></label>
              <div class="export-opts">
                <button type="button" class="export-fmt" data-fmt="xlsx">
                  <strong>Outlook mail-merge (Excel)</strong>
                  <span class="muted sm">Greeting + name + email, one row per person</span></button>
                <button type="button" class="export-fmt" data-fmt="outlook">
                  <strong>Outlook contacts (CSV)</strong>
                  <span class="muted sm">Import straight into an Outlook address book</span></button>
                <button type="button" class="export-fmt" data-fmt="csv">
                  <strong>Plain CSV</strong>
                  <span class="muted sm">All columns, for Excel / general use</span></button>
                <button type="button" class="export-fmt" data-fmt="bcc">
                  <strong>Copy BCC list</strong>
                  <span class="muted sm">Semicolon-joined addresses for a quick send</span></button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="listBanner" class="list-banner" hidden>
        <span>Viewing list: <strong id="listName"></strong>
          <span id="listMembCount" class="muted sm"></span></span>
        <div class="list-banner-actions">
          <button type="button" id="addToListBtn" class="btn-ghost sm-btn" hidden>Add selected</button>
          <button type="button" id="removeFromListBtn" class="btn-ghost sm-btn" hidden>Remove selected</button>
          <button type="button" id="renameListBtn" class="btn-ghost sm-btn">Rename</button>
          <button type="button" id="deleteListBtn" class="btn-ghost sm-btn danger">Delete list</button>
          <button type="button" id="backBtn" class="btn-outline sm-btn">Back to search</button>
        </div>
      </div>

      <div id="grid"></div>
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
  <script src="/static/app.js?v=4"></script>
</body>
</html>
