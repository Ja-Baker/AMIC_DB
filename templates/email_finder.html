<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Finder — AMIC</title>
  <link rel="icon" type="image/png" href="/static/img/amic-logo-color.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css">
  <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css">
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <img src="/static/img/amic-logo-white.png?v=2" alt="AMIC STL">
      <span class="brand-sub">Email Finder</span>
    </a>
    <div class="topbar-links">
      <a class="nav-link" href="/">Search</a>
      <a class="nav-link active" href="/email-finder">Email Finder</a>
      <a class="nav-link" href="/import">Import</a>
      <a class="logout" href="/logout">Sign out</a>
    </div>
  </header>

  <main class="layout" x-data="{ adv:false }">
    <form id="searchForm" class="panel">
      <label class="field">
        <span>Search contacts</span>
        <input type="text" id="q" placeholder="name, company, keyword…">
      </label>

      <label class="field">
        <span>Email status <small>(default: missing)</small></span>
        <select id="email_status"><option value="">Any</option></select>
      </label>

      <label class="field">
        <span>Tags <small>(match any)</small></span>
        <select id="tags" multiple placeholder="Pick tags…"></select>
      </label>

      <div class="grid-2">
        <label class="field"><span>State</span>
          <select id="state"><option value="">Any</option></select>
        </label>
        <label class="field"><span>Source list</span>
          <select id="source"><option value="">Any</option></select>
        </label>
      </div>

      <div class="actions">
        <button type="submit" id="searchBtn" class="btn-primary">Search</button>
        <button type="button" id="resetBtn" class="btn-ghost">Reset</button>
      </div>

      <div class="api-box">
        <div class="api-head">⚙ Finder options</div>
        <label class="field">
          <span>Hunter.io API key <small>(optional — for verified results)</small></span>
          <input type="password" id="hunterKey" placeholder="Paste key to enable API lookups" autocomplete="off">
          <small class="muted sm">Stored only in this browser. Leave blank to use local pattern-guessing.</small>
        </label>
        <label class="switch sm-switch">
          <input type="checkbox" id="localOnly" role="switch">
          <span>Local pattern only (ignore API)</span>
        </label>
        <label class="field">
          <span>Min. confidence to save (<span id="confVal">0.0</span>)</span>
          <input type="range" id="minConf" min="0" max="1" step="0.1" value="0">
          <small class="muted sm">Candidates below this score are reported but not written.</small>
        </label>
      </div>
      <p class="hint">Find emails for contacts missing one. Found addresses are saved
        as <strong>“check”</strong> (unconfirmed) — review them, then Accept or Clear.</p>
    </form>

    <section class="results">
      <div class="results-bar">
        <span id="status" class="status">Search to load contacts, then find emails.</span>
        <div class="results-actions">
          <span id="selCount" class="sel-count" hidden></span>
          <button type="button" id="findBtn" class="btn-primary">✉ Find emails</button>
          <button type="button" id="acceptBtn" class="btn-ghost" hidden>✓ Accept</button>
          <button type="button" id="clearBtn" class="btn-ghost danger" hidden>✕ Clear email</button>
          <button type="button" id="clearResultsBtn" class="btn-outline">Clear results</button>
        </div>
      </div>
      <div id="grid"></div>
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
  <script src="/static/email_finder.js?v=5"></script>
</body>
</html>
