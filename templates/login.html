<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMIC Contact Search — Sign in</title>
  <link rel="icon" type="image/png" href="/static/img/amic-logo-color.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body class="login-body">
  <main class="login-card">
    <img class="login-logo" src="/static/img/amic-logo-color.png?v=2"
         alt="Advanced Manufacturing Innovation Center — St. Louis">
    <h1>Contact Search</h1>
    <p class="tagline">Find the right people. Build the list. <strong>Futures made.</strong></p>
    {% if error %}<p class="banner error">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <label for="password">Access password</label>
      <input type="password" id="password" name="password"
             placeholder="Enter password" autofocus required>
      <button type="submit" class="btn-primary">Sign in</button>
    </form>
    <p class="login-foot">AMIC STL · internal tool</p>
  </main>
</body>
</html>
